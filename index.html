:root{--bg:#0D0D12;--bg2:#1A1A24;--card:#16161F;--brd:#252535;--txt:#EEEEF0;--dim:#7777A0;--ac:#FF6B35}
@media(prefers-color-scheme:light){:root{--bg:#F4F4F8;--bg2:#E8E8F0;--card:#FFF;--brd:#D8D8E4;--txt:#1A1A2E;--dim:#6B6B85;--ac:#FF6B35}}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;max-width:430px;margin:0 auto;overscroll-behavior:none}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input{font-family:inherit;outline:none}
.card{background:var(--card);border-radius:16px;padding:16px;border:1px solid var(--brd)}
.btn{width:100%;padding:14px;border-radius:14px;font-size:16px;font-weight:700;border:none}
.sp{background:var(--ac);opacity:0.15;border:none;border-radius:8px;padding:4px 10px;font-size:13px;cursor:pointer;font-weight:700}
.sp2{background:rgba(255,107,53,0.12);border:none;border-radius:8px;padding:4px 10px;color:var(--ac);font-size:13px;cursor:pointer;font-weight:700}
::-webkit-scrollbar{width:0}
.fade{animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--card);border-top:1px solid var(--brd);display:flex;justify-content:space-around;padding:6px 0 max(env(safe-area-inset-bottom,8px),8px);z-index:100}
.nav button{display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 10px}
.nav .icon{font-size:22px;transition:opacity .2s}
.nav .label{font-size:10px;font-weight:700}
.quit{position:fixed;top:12px;left:12px;background:var(--card);border:1px solid var(--brd)!important;border-radius:12px;padding:8px 14px;color:var(--txt);font-size:13px;font-weight:700;z-index:100}
.prog-bar{background:var(--bg2);border-radius:8px;height:8px;overflow:hidden}
.prog-fill{height:100%;border-radius:8px;transition:width .5s}
.word-btn{border:1px solid var(--brd);border-radius:11px;padding:9px 15px;font-size:15px;font-weight:600;color:var(--txt);background:var(--card);transition:all .15s;min-height:40px}
.word-btn.used{background:var(--bg2);color:transparent;border-color:var(--bg2)}
.word-btn.placed{background:rgba(255,107,53,0.15);border:1px solid rgba(255,107,53,0.35);color:var(--ac);font-weight:700}
.opt-btn{border:2px solid var(--brd);border-radius:14px;padding:13px 16px;font-size:15px;font-weight:600;color:var(--txt);background:var(--card);text-align:left;width:100%;transition:all .15s}
.opt-btn.sel{background:rgba(255,107,53,0.15);border-color:var(--ac);color:var(--ac)}
.opt-btn.correct{background:#1B5E20;border-color:#4CAF50;color:#fff}
.opt-btn.wrong{background:#B71C1C;border-color:#EF5350;color:#fff}
.pair-btn{padding:11px 10px;border-radius:12px;border:2px solid var(--brd);font-size:14px;font-weight:600;text-align:center;background:var(--card);color:var(--txt);transition:all .15s;width:100%}
.pair-btn.sel{border-color:var(--ac);background:rgba(255,107,53,0.15)}
.pair-btn.done{border-color:#4CAF50;color:#4CAF50;opacity:.6;background:rgba(27,94,32,0.12)}
.conj-input{flex:1;padding:10px 12px;border-radius:10px;border:2px solid var(--brd);font-size:15px;font-weight:600;background:var(--card);color:var(--txt);box-sizing:border-box}
.conj-input.ok{border-color:#4CAF50}.conj-input.nok{border-color:#EF5350}
#app{padding-bottom:72px}

{id:"L06",lvl:"A0",t:"Les jours",tn:"Dagen",ic:"📅",cats:["day"],

 tip:"🇧🇪 La semaine commence le lundi (<b>maandag</b>) en Belgique, comme en France. Les jours sont assez similaires à l'allemand et à l'anglais.",

 tip:"🇧🇪 Les mois sont identiques en Belgique et aux Pays-Bas. Bonne nouvelle : pas de piège ici !",

{id:"L17",lvl:"A1",t:"Le présent",tn:"Tegenwoordige tijd",ic:"⏰",cats:["verb"],
 gram:"Conjugaison régulière au présent : prends l'infinitif, enlève <b>-en</b> pour obtenir le radical, puis ajoute les terminaisons. Ex : <b>werken</b> → radical <b>werk</b>. ik werk, jij werk<b>t</b>, hij werk<b>t</b>, wij werk<b>en</b>. Règle spéciale : avec <b>jij</b> en inversion, le -t disparaît ! <b>Werk jij?</b>",
 tip:"🇧🇪 Cette règle de conjugaison est la même en Belgique. C'est une des bases les plus importantes du néerlandais.",
 exs:[["Ik werk in Brussel.","Je travaille à Bruxelles."],["Zij spreekt Nederlands.","Elle parle néerlandais."],["Waar woon jij?","Où habites-tu ?"],["Werk jij vandaag?","Tu travailles aujourd'hui ?"]],

 gram:"Pour exprimer la douleur : <b>Ik heb pijn aan mijn...</b> + partie du corps. On peut aussi créer des mots composés : hoofd+pijn = <b>hoofdpijn</b> (mal de tête), buik+pijn = <b>buikpijn</b> (mal au ventre).",
 tip:"🇧🇪 Cette construction composée est très productive en néerlandais. Tu peux combiner beaucoup de mots pour en créer de nouveaux !",

{id:"L23",lvl:"A2",t:"Chez le médecin",tn:"Bij de dokter",ic:"🏥",cats:["health"],
 gram:"Chez le médecin : <b>Ik voel me niet lekker</b> (je ne me sens pas bien), <b>Ik heb koorts</b> (j'ai de la fièvre), <b>Ik ben verkouden</b> (je suis enrhumé). Le médecin dira : <b>Waar doet het pijn?</b> (où avez-vous mal ?).",
 tip:"🇧🇪 En Belgique, le médecin généraliste = <b>de huisarts</b>. La <b>mutualiteit</b> (mutuelle) est essentielle pour le remboursement des soins.",
 exs:[["Ik voel me niet lekker.","Je ne me sens pas bien."],["Ik heb koorts en hoofdpijn.","J'ai de la fièvre et mal à la tête."],["Ik moet naar de dokter.","Je dois aller chez le médecin."]],

{id:"L24",lvl:"A2",t:"Au travail",tn:"Op het werk",ic:"💼",cats:["work"],
 gram:"Le vocabulaire du travail : <b>het kantoor</b> (le bureau), <b>de vergadering</b> (la réunion), <b>de collega</b> (le collègue), <b>het salaris</b> (le salaire), <b>druk</b> (occupé/chargé). Pour le futur professionnel : <b>solliciteren</b> = postuler.",
 tip:"🇧🇪 Beaucoup de mots du travail en néerlandais belge viennent du français : <b>bureau</b>, <b>chef</b>, <b>collega</b>. C'est un avantage pour les francophones !",
 exs:[["De vergadering begint om tien uur.","La réunion commence à dix heures."],["Ik werk als ingenieur.","Je travaille comme ingénieur."],["Het is vandaag heel druk.","C'est très chargé aujourd'hui."]],

{id:"L25",lvl:"A2",t:"La météo",tn:"Het weer",ic:"🌤️",cats:["weather"],

 tip:"🇧🇪 Sujet de conversation #1 en Belgique : la météo ! 'Het regent altijd in België' (Il pleut toujours en Belgique) est presque un proverbe national 😄",

{id:"L26",lvl:"A2",t:"Hobbies",tn:"Hobby's",ic:"⚽",cats:["hobby"],
 gram:"Pour exprimer tes goûts, utilise <b>graag</b> après le verbe : <b>Ik fiets graag</b> (j'aime faire du vélo). Pour 'aimer' + nom : <b>Ik hou van</b> muziek. Pour 'préférer' : <b>het liefst</b>. Pour proposer : <b>Zullen we...?</b> (On... ?).",
 tip:"🇧🇪 Le <b>fietsen</b> (vélo) est un mode de vie en Flandre ! Parler de vélo est un excellent sujet de conversation avec les Flamands.",
 exs:[["Ik fiets graag.","J'aime faire du vélo."],["Ik hou van muziek.","J'aime la musique."],["Zullen we gaan wandelen?","On va se promener ?"]],

{id:"L27",lvl:"A2",t:"Routine",tn:"Dagelijkse routine",ic:"🔁",cats:["daily"],
 gram:"Les verbes séparables sont fréquents au quotidien : <b>op|staan</b> (se lever) → Ik <b>sta</b> om 7 uur <b>op</b>. Le préfixe va à la FIN ! Autres exemples : <b>aan|komen</b> (arriver), <b>terug|komen</b> (revenir), <b>mee|brengen</b> (apporter).",
 tip:"🇧🇪 Les verbes séparables sont un des aspects les plus déroutants du néerlandais pour les francophones. La clé : le préfixe va toujours à la fin !",
 exs:[["Ik sta om zeven uur op.","Je me lève à sept heures."],["De trein komt om acht uur aan.","Le train arrive à huit heures."],["Ik kom om zes uur thuis.","Je rentre à six heures."]],

{id:"L28",lvl:"A2",t:"L'administratif",tn:"Administratie",ic:"📋",cats:["admin"],
 gram:"Vocabulaire de la commune : <b>het formulier</b> (formulaire), <b>invullen</b> (remplir, verbe séparable !), <b>ondertekenen</b> (signer), <b>de afspraak</b> (rendez-vous). Pour les formulaires : achternaam (nom), voornaam (prénom), geboortedatum (date de naissance), adres.",
 tip:"🇧🇪 En Flandre, tout l'administratif est en néerlandais uniquement. À Bruxelles : bilingue FR/NL. Connaître ces mots est vraiment utile !",

{id:"L29",lvl:"A2",t:"Le passé composé",tn:"Voltooid tegenwoordige tijd",ic:"⏪",cats:["verb"],
 gram:"Le passé composé = <b>hebben/zijn</b> + <b>voltooid deelwoord</b> (participe passé). Régulier : <b>ge</b>+radical+<b>t/d</b> → gewerkt, geleerd. Irrégulier : geweest, gegaan, gegeten. Les verbes de mouvement utilisent <b>zijn</b> : Ik <b>ben</b> gegaan.",
 tip:"🇧🇪 Le passé composé est le temps du passé le plus utilisé à l'oral en néerlandais. Le passé simple (OVT) est plus littéraire/écrit.",
 exs:[["Ik heb hard gewerkt.","J'ai travaillé dur."],["Wij zijn naar Brugge geweest.","Nous sommes allés à Bruges."],["Heb je goed geslapen?","As-tu bien dormi ?"]],
 dr:[{type:"build",fr:"J'ai travaillé dur hier.",w:["Ik","heb","gisteren","hard","gewerkt","."],x:["vandaag","morgen"]},{type:"build",fr:"Nous sommes allés à Bruges.",w:["Wij","zijn","naar","Brugge","geweest","."],x:["Gent","gegaan"]},{type:"fill",s:"Ik heb het boek _____.",ans:"gelezen",h:"participe lezen"},{type:"pair",p:[["gewerkt","travaillé"],["gegeten","mangé"],["geweest","été"],["geschreven","écrit"]]},{type:"mcq",q:"Participe de 'drinken':",o:["gedrinkt","gedronken","gedrunken"],a:1}]},
{id:"L30",lvl:"A2",t:"Le futur",tn:"De toekomst",ic:"🔮",cats:["verb"],
 gram:"Deux façons d'exprimer le futur : <b>gaan</b> + infinitif (oral, courant) : Ik <b>ga</b> morgen werken. <b>Zullen</b> + infinitif (plus formel) : Het <b>zal</b> morgen regenen. Le 2ème verbe va toujours à l'infinitif à la fin !",
 tip:"🇧🇪 À l'oral en Belgique, on utilise surtout <b>gaan</b>. 'Zullen' est plus formel ou pour faire des propositions : 'Zullen we gaan?' (On y va ?).",
 exs:[["Ik ga morgen werken.","Je vais travailler demain."],["Het zal morgen regenen.","Il pleuvra demain."],["Zullen we gaan eten?","On va manger ?"]],

{id:"L31",lvl:"A2",t:"Comparatifs",tn:"Vergelijkingen",ic:"⚖️",cats:["adj"],
 gram:"Comparatif : adjectif + <b>-er</b> (+ <b>dan</b>) : groter dan (plus grand que). Superlatif : adjectif + <b>-st</b> : grootst (le plus grand). Irréguliers importants : goed → <b>beter</b> → <b>best</b>, veel → <b>meer</b> → <b>meest</b>.",
 tip:"🇧🇪 Le comparatif est plus simple qu'en français — pas de 'plus...que', juste un suffixe. Profites-en !",
 exs:[["Brussel is groter dan Gent.","Bruxelles est plus grande que Gand."],["Dit bier is beter.","Cette bière est meilleure."],["Dit is de mooiste stad.","C'est la plus belle ville."]],

{id:"L32",lvl:"A2",t:"À la gare",tn:"Op het station",ic:"🚉",cats:["transport"],

{id:"L33",lvl:"A2",t:"Passé: verbes",tn:"VTT oefening",ic:"📖",cats:["verb"],

{id:"L36",lvl:"B1",t:"Mots de liaison",tn:"Verbindingswoorden",ic:"🔗",cats:["connect"],
 gram:"Les connecteurs changent l'ordre des mots ! Avec <b>omdat</b> (parce que), <b>dat</b> (que), <b>als</b> (si) → le verbe va à la <b>fin</b> : Ik blijf thuis <b>omdat</b> ik ziek <b>ben</b>. Avec <b>want</b> (car), <b>maar</b> (mais), <b>en</b> (et) → l'ordre ne change pas.",
 tip:"🇧🇪 Maîtriser 'omdat' vs 'want' est un tournant dans ton apprentissage. Les deux signifient 'parce que' mais la structure est différente !",
 exs:[["Ik blijf thuis omdat ik ziek ben.","Je reste car je suis malade."],["Het is koud, maar ik ga wandelen.","Il fait froid, mais je vais me promener."],["Zodra hij aankomt, vertrekken we.","Dès qu'il arrive, nous partons."]],

{id:"L37",lvl:"B1",t:"Émotions",tn:"Gevoelens",ic:"❤️",cats:["emotion"],
 gram:"Pour exprimer tes émotions avec nuance : <b>Ik voel me</b> + adjectif (je me sens...). Vocabulaire avancé : <b>teleurgesteld</b> (déçu), <b>opgelucht</b> (soulagé), <b>trots</b> (fier), <b>zenuwachtig</b> (nerveux), <b>eenzaam</b> (seul).",

{id:"L38",lvl:"B1",t:"Donner son avis",tn:"Je mening geven",ic:"💭",cats:["abstract"],

 tip:"🇧🇪 En Belgique, on exprime souvent son avis de manière un peu plus nuancée qu'aux Pays-Bas. 'Misschien' (peut-être) et 'eigenlijk' (en fait) sont utiles !",
 exs:[["Ik vind dat hij gelijk heeft.","Je trouve qu'il a raison."],["Volgens mij is dat een goed idee.","Selon moi c'est une bonne idée."],["Ik ben het daar niet mee eens.","Je ne suis pas d'accord."]],

{id:"L39",lvl:"B1",t:"Verbes avancés",tn:"Geavanceerde werkwoorden",ic:"🧠",cats:["verbB1"],
 gram:"Des verbes pour des conversations plus riches : <b>uitleggen</b> (expliquer), <b>vergelijken</b> (comparer), <b>beslissen</b> (décider), <b>zich herinneren</b> (se souvenir), <b>verbeteren</b> (améliorer), <b>overtuigen</b> (convaincre), <b>verwachten</b> (s'attendre à).",

function loadProgress(){try{const r=localStorage.getItem('vl4');if(r)S.progress=JSON.parse(r);}catch(e){}}
function saveProgress(){try{localStorage.setItem('vl4',JSON.stringify(S.progress));}catch(e){}}

function genVocabEx(cats,n=6){
  const pool=VOCAB.filter(w=>cats.includes(w.cat));if(pool.length<4)return[];
  const sh=[...pool].sort(()=>Math.random()-.5);
  return sh.slice(0,n).map((w,i)=>{
    const r=Math.random();
    const wr=pool.filter(x=>x.nl!==w.nl).sort(()=>Math.random()-.5).slice(0,3);
    // MCQ NL→FR
    if(r<.25){const opts=[...wr.map(x=>x.fr),w.fr].sort(()=>Math.random()-.5);return{type:"mcq",q:`Que signifie '${w.nl}' ?`,o:opts,a:opts.indexOf(w.fr)};}
    // MCQ FR→NL
    else if(r<.5){const opts=[...wr.map(x=>x.nl),w.nl].sort(()=>Math.random()-.5);return{type:"mcq",q:`Comment dit-on '${w.fr}' ?`,o:opts,a:opts.indexOf(w.nl)};}
    // Write NL (see French, type Dutch)
    else if(r<.7){return{type:"writeNL",fr:w.fr,ans:w.nl};}
    // Write FR (see Dutch, type French)
    else{return{type:"writeFR",nl:w.nl,ans:w.fr};}
  });
}

function startLesson(lesson){
  S.lesson=lesson;S.screen="learn";S.phase="learn";render();
}
function startExercises(){
  const vocab=genVocabEx(S.lesson.cats,6);
  const all=[...vocab,...(S.lesson.dr||[])].sort(()=>Math.random()-.5);
  S.exercises=all;S.exIdx=0;S.score=0;S.total=all.length;S.screen="exercise";S.phase="exercise";
  resetEx();render();
}
function resetEx(){S.checked=false;S.correct=false;S.answer=null;S.textAns="";S.buildOrder=[];S.shuffledWords=[];S.pairSel=null;S.pairDone=[];S.shuffledRight=[];S.conjAns={};}
function nextEx(){
  S.exIdx++;resetEx();
  if(S.exIdx>=S.exercises.length){finishLesson();return;}
  render();
}
function finishLesson(){
  if(!S.progress.done.includes(S.lesson.id))S.progress.done.push(S.lesson.id);
  S.progress.xp=(S.progress.xp||0)+S.score*10+20;
  saveProgress();S.screen="result";render();
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}

// ─── RENDER ──────────────────────────────────────────────────
function render(){
  const a=document.getElementById('app');
  a.className='fade';
  if(S.screen==="home")a.innerHTML=renderHome();
  else if(S.screen==="learn")a.innerHTML=renderLearn();
  else if(S.screen==="exercise")a.innerHTML=renderExercise();
  else if(S.screen==="result")a.innerHTML=renderResult();
  else if(S.screen==="flash")a.innerHTML=renderFlash();
  else if(S.screen==="verbs")a.innerHTML=renderVerbs();
  else if(S.screen==="profile")a.innerHTML=renderProfile();
  if(S.screen!=="exercise"&&S.screen!=="learn")a.innerHTML+=renderNav();
  // Rebind
  setTimeout(()=>{
    document.querySelectorAll('[data-fill]').forEach(el=>{el.value=S.textAns;});
    document.querySelectorAll('[data-conj]').forEach(el=>{el.value=S.conjAns[el.dataset.conj]||'';});
    document.querySelectorAll('[data-vprac]').forEach(el=>{el.value=S.verbPractice[el.dataset.vprac]||'';});
    document.getElementById('dict-input')&&(document.getElementById('dict-input').value=S.search);
  },10);
}

function renderLearn(){
  const lesson=S.lesson;
  const C=LEVELS.find(l=>l.id===lesson.lvl)?.color||'#FF6B35';
  const vocabPool=VOCAB.filter(w=>lesson.cats.includes(w.cat));
  let h=`<button class="quit" onclick="S.screen='home';S.lesson=null;render()">✕</button>`;
  h+=`<div style="padding:60px 20px 100px">`;
  // Header
  h+=`<div style="text-align:center;margin-bottom:24px">
    <div style="font-size:48px;margin-bottom:8px">${lesson.ic}</div>
    <h2 style="font-size:22px;font-weight:900;margin:0">${esc(lesson.t)}</h2>
    <p style="color:var(--dim);font-size:14px;margin:4px 0 0">${esc(lesson.tn)}</p>
  </div>`;
  // Step 1: Vocabulary cards
  h+=`<div style="margin-bottom:24px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
      <span style="font-size:20px">📝</span>
      <h3 style="font-size:16px;font-weight:800;margin:0;color:${C}">Vocabulaire à découvrir</h3>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px">`;
  vocabPool.slice(0,12).forEach(w=>{
    h+=`<div class="card" style="padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer" onclick="speak('${esc(w.nl)}')">
      ${spBtn(w.nl,C)}
      <div style="flex:1">
        <div style="font-weight:700;font-size:15px">${esc(w.nl)}</div>
        <div style="color:var(--dim);font-size:13px;margin-top:2px">${esc(w.fr)}</div>
      </div>
    </div>`;
  });
  h+=`</div></div>`;
  // Step 2: Grammar
  if(lesson.gram){
    h+=`<div style="margin-bottom:24px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        <span style="font-size:20px">📐</span>
        <h3 style="font-size:16px;font-weight:800;margin:0;color:${C}">Ce qu'il faut retenir</h3>
      </div>
      <div class="card" style="line-height:1.7;font-size:14px">${lesson.gram}</div>
    </div>`;
  }
  // Step 3: Example sentences
  if(lesson.exs&&lesson.exs.length){
    h+=`<div style="margin-bottom:24px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        <span style="font-size:20px">💬</span>
        <h3 style="font-size:16px;font-weight:800;margin:0;color:${C}">Exemples en contexte</h3>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px">`;
    lesson.exs.forEach(([nl,fr])=>{
      h+=`<div class="card" style="padding:12px 14px;cursor:pointer" onclick="speak('${esc(nl)}')">
        <div style="display:flex;align-items:center;gap:8px">
          ${spBtn(nl,C)}
          <div style="font-weight:700;font-size:15px;color:${C}">${esc(nl)}</div>
        </div>
        <div style="color:var(--dim);font-size:13px;margin-top:6px;padding-left:42px">${esc(fr)}</div>
      </div>`;
    });
    h+=`</div></div>`;
  }
  // Step 4: Belgian tip
  if(lesson.tip){
    h+=`<div style="margin-bottom:24px">
      <div class="card" style="background:rgba(255,107,53,0.08);border-color:rgba(255,107,53,0.25);line-height:1.7;font-size:14px">${lesson.tip}</div>
    </div>`;
  }
  // CTA Button
  h+=`<button class="btn" style="background:${C};color:#fff;font-size:18px;padding:16px;margin-top:8px" onclick="startExercises()">
    🎯 C'est parti — Exercices !
  </button>`;
  h+=`</div>`;
  return h;
}

function renderNav(){
  const items=[{id:"home",ic:"🏠",l:"Accueil"},{id:"verbs",ic:"📖",l:"Verbes"},{id:"flash",ic:"⚡",l:"Dico"},{id:"profile",ic:"👤",l:"Profil"}];
  return `<div class="nav">${items.map(n=>`<button onclick="S.screen='${n.id}';render()"><span class="icon" style="opacity:${S.screen===n.id?1:.4}">${n.ic}</span><span class="label" style="color:${S.screen===n.id?'var(--ac)':'var(--dim)'}">${n.l}</span></button>`).join('')}</div>`;
}

// ─── HOME ────────────────────────────────────────────────────
function renderHome(){
  const tL=L.length,dL=S.progress.done.length,pct=Math.round(dL/tL*100);
  let h=`<div style="padding:0 20px 100px">
  <div style="padding-top:16px;display:flex;justify-content:space-between;align-items:center">
    <div><h1 style="font-size:26px;font-weight:900;margin:0">Vlaams Leren <span style="font-size:18px">🇧🇪</span></h1>
    <p style="color:var(--dim);font-size:12px;margin:2px 0 0">${VOCAB.length} mots · ${tL} leçons · ${VERBS.length} verbes</p></div>
    <div style="background:var(--ac);border-radius:14px;padding:7px 13px;display:flex;align-items:center;gap:5px">
    <span style="font-size:14px">⚡</span><span style="font-weight:800;color:#fff;font-size:14px">${S.progress.xp||0}</span></div>
  </div>
  <div class="card" style="margin-top:16px">
    <div style="display:flex;justify-content:space-between;margin-bottom:10px">
      <span style="font-weight:700;font-size:14px">Progression</span>
      <span style="color:var(--ac);font-weight:700;font-size:14px">${pct}%</span>
    </div>
    <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:linear-gradient(90deg,#FF6B35,#FF9F43)"></div></div>
    <div style="display:flex;justify-content:space-around;margin-top:14px">
      <div style="text-align:center"><div style="font-size:18px">📘</div><div style="font-weight:800;font-size:17px">${dL}/${tL}</div><div style="color:var(--dim);font-size:11px">Leçons</div></div>
      <div style="text-align:center"><div style="font-size:18px">💬</div><div style="font-weight:800;font-size:17px">${VOCAB.length}+</div><div style="color:var(--dim);font-size:11px">Mots</div></div>
      <div style="text-align:center"><div style="font-size:18px">📖</div><div style="font-weight:800;font-size:17px">${VERBS.length}</div><div style="color:var(--dim);font-size:11px">Verbes</div></div>
    </div>
  </div>`;
  LEVELS.forEach(lv=>{
    const ls=L.filter(l=>l.lvl===lv.id),dn=ls.filter(l=>S.progress.done.includes(l.id)).length;
    const open=S.selLevel===lv.id;
    h+=`<div style="margin-top:20px">
      <button onclick="S.selLevel=S.selLevel==='${lv.id}'?null:'${lv.id}';render()" style="display:flex;align-items:center;gap:12px;width:100%;text-align:left">
        <div style="width:44px;height:44px;border-radius:13px;background:${lv.color}22;display:flex;align-items:center;justify-content:center;font-size:22px">${lv.icon}</div>
        <div style="flex:1"><div style="font-weight:800;font-size:15px;color:var(--txt)">${lv.id} — ${lv.name}</div>
        <div style="color:var(--dim);font-size:12px">${lv.desc} · ${dn}/${ls.length}</div>
        <div class="prog-bar" style="height:4px;margin-top:6px"><div class="prog-fill" style="width:${Math.round(dn/ls.length*100)}%;background:${lv.color}"></div></div></div>
        <span style="color:var(--dim);font-size:18px;transform:rotate(${open?90:0}deg);transition:transform .2s">›</span>
      </button>`;
    if(open){
      h+=`<div style="display:flex;flex-direction:column;gap:6px;margin-top:10px;margin-left:14px;border-left:3px solid ${lv.color}30;padding-left:14px">`;
      ls.forEach((lesson,i)=>{
        const done=S.progress.done.includes(lesson.id);
        h+=`<button onclick="startLesson(L[${L.indexOf(lesson)}])" style="display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid ${done?lv.color:'var(--brd)'};border-radius:14px;padding:12px 14px;text-align:left;width:100%">
          <span style="font-size:20px;width:28px;text-align:center">${done?'✅':lesson.ic}</span>
          <div style="flex:1"><div style="font-weight:700;font-size:14px;color:var(--txt)">${lesson.t}</div>
          <div style="color:var(--dim);font-size:11px;margin-top:1px">${lesson.tn} · ${(lesson.dr?.length||0)+4} ex.</div></div>
        </button>`;
      });
      h+=`</div>`;
    }
    h+=`</div>`;
  });
  return h+`</div>`;
}

// ─── EXERCISE ENGINE ─────────────────────────────────────────
function renderExercise(){
  if(S.exIdx>=S.exercises.length){return '<div style="padding:60px 20px;text-align:center"><p style="color:var(--dim)">Chargement des résultats...</p></div>';}
  const ex=S.exercises[S.exIdx];
  const prog=(S.exIdx/S.exercises.length)*100;
  const C=LEVELS.find(l=>l.id===S.lesson.lvl)?.color||'#FF6B35';
  let h=`<button class="quit" onclick="S.screen='home';S.lesson=null;render()">✕</button>`;
  h+=`<div style="padding:60px 20px 100px">`;
  h+=`<div style="margin-bottom:16px"><div style="display:flex;justify-content:space-between;margin-bottom:8px">
    <span style="color:var(--dim);font-size:13px;font-weight:600">${S.exIdx+1} / ${S.exercises.length}</span>
    <span style="color:${C};font-size:13px;font-weight:700">✓ ${S.score}</span></div>
    <div class="prog-bar" style="height:5px"><div class="prog-fill" style="width:${prog}%;background:${C}"></div></div></div>`;

  // BUILD
  if(ex.type==="build"){
    if(!S.shuffledWords.length){S.shuffledWords=[...ex.w,...(ex.x||[])].sort(()=>Math.random()-.5);}
    const sw=S.shuffledWords;
    const built=S.buildOrder.map(i=>sw[i]).join(" ");
    const target=ex.w.join(" ");
    const targetLen=ex.w.length;
    h+=`<div class="card" style="margin-bottom:14px"><p style="font-size:13px;color:var(--dim);margin:0 0 4px;font-weight:600">🧩 Reconstitue la phrase :</p>
      <p style="font-size:15px;font-weight:700;color:${C};margin:0">${esc(ex.fr)}</p>
      <div style="margin-top:8px">${spBtn(ex.w.join(' ').replace(/ ([.,!?])/g,'$1'),C)}</div></div>`;
    h+=`<div class="card" style="min-height:52px;margin-bottom:14px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;border-color:${S.checked?(S.correct?'#4CAF50':'#EF5350'):'var(--brd)'}">`;
    if(!S.buildOrder.length)h+=`<span style="color:var(--dim);font-size:14px">Sélectionne les mots...</span>`;
    S.buildOrder.forEach((idx,i)=>{h+=`<button class="word-btn placed" onclick="if(!S.checked){S.buildOrder.splice(${i},1);render()}">${esc(sw[idx])}</button>`;});
    h+=`</div><div style="display:flex;flex-wrap:wrap;gap:7px">`;
    sw.forEach((w,i)=>{const used=S.buildOrder.includes(i);h+=`<button class="word-btn${used?' used':''}" onclick="if(!S.checked&&!S.buildOrder.includes(${i})){S.buildOrder.push(${i});render()}">${esc(w)}</button>`;});
    h+=`</div>`;
    if(S.checked&&S.correct)h+=`<div class="card" style="margin-top:10px;border-color:#4CAF50;background:rgba(27,94,32,.12)">✅ <span style="font-weight:700;color:#4CAF50">Parfait !</span></div>`;
    if(S.checked&&!S.correct)h+=`<div class="card" style="margin-top:10px;border-color:#EF5350;background:rgba(183,28,28,.12)">❌ <span style="font-weight:700;color:#EF5350">Pas tout à fait</span><p style="color:var(--dim);font-size:13px;margin:6px 0 0">Réponse : <strong style="color:var(--txt)">${esc(target.replace(/ ([.,!?])/g,'$1'))}</strong></p></div>`;
    if(!S.checked&&S.buildOrder.length>0)h+=`<button class="btn" style="background:${C};color:#fff;margin-top:12px" onclick="checkBuild()">Vérifier</button>`;
  }
  // MCQ
  else if(ex.type==="mcq"){
    h+=`<div class="card" style="margin-bottom:14px"><p style="font-size:16px;font-weight:700;margin:0;line-height:1.5">${esc(ex.q)}</p></div>`;
    h+=`<div style="display:flex;flex-direction:column;gap:7px">`;
    ex.o.forEach((o,i)=>{
      let cls='opt-btn';
      if(S.checked){if(i===ex.a)cls+=' correct';else if(i===S.answer)cls+=' wrong';}
      else if(i===S.answer)cls+=' sel';
      h+=`<button class="${cls}" onclick="if(!S.checked){S.answer=${i};render()}">${esc(o)}</button>`;
    });
    h+=`</div>`;
    if(!S.checked&&S.answer!==null)h+=`<button class="btn" style="background:${C};color:#fff;margin-top:14px" onclick="S.checked=true;S.correct=S.answer===${ex.a};if(S.correct)S.score++;render()">Vérifier</button>`;
    if(S.checked)h+=`<div class="card" style="margin-top:10px;border-color:${S.correct?'#4CAF50':'#EF5350'};background:${S.correct?'rgba(27,94,32,.12)':'rgba(183,28,28,.12)'}">
      <span style="font-size:18px;margin-right:8px">${S.correct?'✅':'❌'}</span><span style="font-weight:700;color:${S.correct?'#4CAF50':'#EF5350'}">${S.correct?'Correct !':'Incorrect'}</span>
      ${!S.correct?`<p style="color:var(--dim);font-size:13px;margin:6px 0 0">Réponse : <strong style="color:var(--txt)">${esc(ex.o[ex.a])}</strong></p>`:''}</div>`;
  }
  // FILL
  else if(ex.type==="fill"){
    h+=`<div class="card" style="margin-bottom:14px"><p style="font-size:13px;color:var(--dim);margin:0 0 4px;font-weight:600">✏️ Complète :</p>
      <p style="font-size:17px;font-weight:700;margin:0;line-height:1.6">${esc(ex.s)}</p>
      ${ex.h?`<p style="font-size:12px;color:${C};margin:8px 0 0">💡 ${esc(ex.h)}</p>`:''}</div>`;
    h+=`<input data-fill type="text" ${S.checked?'disabled':''} placeholder="Ta réponse..." oninput="S.textAns=this.value"
      onkeydown="if(event.key==='Enter'&&S.textAns.trim()&&!S.checked){S.checked=true;S.correct=S.textAns.trim().toLowerCase()==='${ex.ans.toLowerCase()}';if(S.correct)S.score++;render()}"
      style="width:100%;padding:14px 16px;border-radius:14px;border:2px solid ${S.checked?(S.correct?'#4CAF50':'#EF5350'):'var(--brd)'};font-size:16px;font-weight:600;background:var(--card);color:var(--txt);box-sizing:border-box">`;
    if(!S.checked)h+=`<button class="btn" style="background:${C};color:#fff;margin-top:14px" onclick="if(!S.textAns.trim())return;S.checked=true;S.correct=S.textAns.trim().toLowerCase()==='${ex.ans.toLowerCase()}';if(S.correct)S.score++;render()">Vérifier</button>`;
    if(S.checked)h+=`<div class="card" style="margin-top:10px;border-color:${S.correct?'#4CAF50':'#EF5350'}">
      ${S.correct?'✅':'❌'} <span style="font-weight:700;color:${S.correct?'#4CAF50':'#EF5350'}">${S.correct?'Correct':'Pas tout à fait'}</span>
      ${!S.correct?`<p style="color:var(--dim);font-size:13px;margin:6px 0 0">Réponse : <strong style="color:var(--txt)">${esc(ex.ans)}</strong></p>`:''}</div>`;
  }
  // WRITE NL (see French → write Dutch)
  else if(ex.type==="writeNL"){
    h+=`<div class="card" style="margin-bottom:14px"><p style="font-size:13px;color:var(--dim);margin:0 0 4px;font-weight:600">🇫🇷→🇧🇪 Écris en néerlandais :</p>
      <p style="font-size:20px;font-weight:800;color:${C};margin:0">${esc(ex.fr)}</p></div>`;
    h+=`<input data-fill type="text" ${S.checked?'disabled':''} placeholder="En néerlandais..." oninput="S.textAns=this.value"
      onkeydown="if(event.key==='Enter'&&S.textAns.trim()&&!S.checked){checkWriteNL()}"
      style="width:100%;padding:14px 16px;border-radius:14px;border:2px solid ${S.checked?(S.correct?'#4CAF50':'#EF5350'):'var(--brd)'};font-size:16px;font-weight:600;background:var(--card);color:var(--txt);box-sizing:border-box">`;
    if(!S.checked)h+=`<button class="btn" style="background:${C};color:#fff;margin-top:14px" onclick="if(!S.textAns.trim())return;checkWriteNL()">Vérifier</button>`;
    if(S.checked)h+=`<div class="card" style="margin-top:10px;border-color:${S.correct?'#4CAF50':'#EF5350'}">
      ${S.correct?'✅':'❌'} <span style="font-weight:700;color:${S.correct?'#4CAF50':'#EF5350'}">${S.correct?'Correct !':'Pas tout à fait'}</span>
      <p style="color:var(--dim);font-size:13px;margin:6px 0 0">Réponse : <strong style="color:var(--txt)">${esc(ex.ans)}</strong></p></div>`;
  }
  // WRITE FR (see Dutch → write French)
  else if(ex.type==="writeFR"){
    h+=`<div class="card" style="margin-bottom:14px"><p style="font-size:13px;color:var(--dim);margin:0 0 4px;font-weight:600">🇧🇪→🇫🇷 Traduis en français :</p>
      <div style="display:flex;align-items:center;gap:8px"><p style="font-size:20px;font-weight:800;color:${C};margin:0">${esc(ex.nl)}</p>${spBtn(ex.nl,C)}</div></div>`;
    const ansOptions=ex.ans.toLowerCase().split('/').map(a=>a.trim());
    h+=`<input data-fill type="text" ${S.checked?'disabled':''} placeholder="En français..." oninput="S.textAns=this.value"
      onkeydown="if(event.key==='Enter'&&S.textAns.trim()&&!S.checked){checkWriteFR()}"
      style="width:100%;padding:14px 16px;border-radius:14px;border:2px solid ${S.checked?(S.correct?'#4CAF50':'#EF5350'):'var(--brd)'};font-size:16px;font-weight:600;background:var(--card);color:var(--txt);box-sizing:border-box">`;
    if(!S.checked)h+=`<button class="btn" style="background:${C};color:#fff;margin-top:14px" onclick="if(!S.textAns.trim())return;checkWriteFR()">Vérifier</button>`;
    if(S.checked)h+=`<div class="card" style="margin-top:10px;border-color:${S.correct?'#4CAF50':'#EF5350'}">
      ${S.correct?'✅':'❌'} <span style="font-weight:700;color:${S.correct?'#4CAF50':'#EF5350'}">${S.correct?'Correct !':'Pas tout à fait'}</span>
      <p style="color:var(--dim);font-size:13px;margin:6px 0 0">Réponse : <strong style="color:var(--txt)">${esc(ex.ans)}</strong></p></div>`;
  }
  // PAIR
  else if(ex.type==="pair"){
    if(!S.shuffledRight.length)S.shuffledRight=ex.p.map(([,b],i)=>({t:b,id:i})).sort(()=>Math.random()-.5);
    const left=ex.p.map(([a],i)=>({t:a,id:i}));
    h+=`<p style="font-size:14px;color:var(--dim);font-weight:600;margin:0 0 12px">🔗 Associe les paires :</p>`;
    h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">`;
    h+=`<div style="display:flex;flex-direction:column;gap:6px">`;
    left.forEach(it=>{const done=S.pairDone.includes(it.id);const sel=S.pairSel?.id===it.id&&S.pairSel?.s==='l';
      h+=`<button class="pair-btn${done?' done':sel?' sel':''}" onclick="handlePair(${it.id},'l')">${esc(it.t)}</button>`;});
    h+=`</div><div style="display:flex;flex-direction:column;gap:6px">`;
    S.shuffledRight.forEach(it=>{const done=S.pairDone.includes(it.id);const sel=S.pairSel?.id===it.id&&S.pairSel?.s==='r';
      h+=`<button class="pair-btn${done?' done':sel?' sel':''}" onclick="handlePair(${it.id},'r')">${esc(it.t)}</button>`;});
    h+=`</div></div>`;
    if(S.checked)h+=`<div class="card" style="margin-top:12px;border-color:#4CAF50;background:rgba(27,94,32,.12)">✅ <span style="font-weight:700;color:#4CAF50">Toutes les paires !</span></div>`;
  }
  // CONJ
  else if(ex.type==="conj"){
    const forms=Object.entries(ex.f);
    h+=`<div class="card" style="margin-bottom:14px"><p style="font-size:13px;color:var(--dim);margin:0 0 4px;font-weight:600">✏️ Conjugue :</p>
      <div style="display:flex;align-items:center;gap:8px"><p style="font-size:22px;font-weight:800;color:${C};margin:0">${esc(ex.v)}</p>${spBtn(ex.v,C)}</div></div>`;
    h+=`<div style="display:flex;flex-direction:column;gap:8px">`;
    forms.forEach(([p,f])=>{
      const ok=S.conjAns[p]?.trim().toLowerCase()===f.toLowerCase();
      h+=`<div style="display:flex;align-items:center;gap:8px">
        <span style="width:80px;font-size:14px;font-weight:700;flex-shrink:0">${esc(p)}</span>
        <input class="conj-input${S.checked?(ok?' ok':' nok'):''}" data-conj="${esc(p)}" ${S.checked?'disabled':''} placeholder="..."
          oninput="S.conjAns['${esc(p)}']=this.value">
        ${S.checked?`<span>${ok?'✅':'❌'}</span>`:''}
      </div>`;
    });
    h+=`</div>`;
    if(S.checked&&!S.correct)h+=`<div class="card" style="margin-top:10px"><p style="font-size:13px;color:var(--dim);margin:0;line-height:1.7">${forms.map(([k,v])=>`<strong>${esc(k)}</strong> → ${esc(v)}`).join('<br>')}</p></div>`;
    const allFilled=forms.every(([k])=>S.conjAns[k]?.trim());
    if(!S.checked&&allFilled)h+=`<button class="btn" style="background:${C};color:#fff;margin-top:14px" onclick="checkConj()">Vérifier</button>`;
  }

  if(S.checked)h+=`<button class="btn" style="background:var(--card);color:${C};border:2px solid ${C};margin-top:12px" onclick="${S.exIdx<S.exercises.length-1?'nextEx()':'finishLesson()'}">${S.exIdx<S.exercises.length-1?'Suivant →':'Voir résultat →'}</button>`;
  return h+`</div>`;
}

function handlePair(id,side){
  if(S.pairDone.includes(id))return;
  if(!S.pairSel){S.pairSel={id,s:side};render();return;}
  if(S.pairSel.s===side){S.pairSel={id,s:side};render();return;}
  if(S.pairSel.id===id){S.pairDone.push(id);S.pairSel=null;
    const ex=S.exercises[S.exIdx];
    if(S.pairDone.length===ex.p.length){S.checked=true;S.correct=true;S.score++;}
  }else S.pairSel=null;
  render();
}
function checkConj(){
  const ex=S.exercises[S.exIdx];const forms=Object.entries(ex.f);
  S.checked=true;S.correct=forms.every(([k,v])=>{const a=S.conjAns[k]?.trim().toLowerCase();const c=v.toLowerCase();return a===c||c.split('/').some(x=>a===x.trim());});
  if(S.correct)S.score++;render();
}
function norm(s){return s.replace(/ ([.,!?;:])/g,'$1').replace(/([.,!?;:]) /g,'$1 ').trim().toLowerCase()}
function checkBuild(){
  const ex=S.exercises[S.exIdx];
  const built=S.buildOrder.map(i=>S.shuffledWords[i]).join(' ');
  const target=ex.w.join(' ');
  S.checked=true;
  S.correct=norm(built)===norm(target);
  if(S.correct)S.score++;
  render();
}
function checkWrite(full,short){
  const a=S.textAns.trim().toLowerCase();
  S.checked=true;S.correct=(a===full||a===short||full.includes(a)||a.includes(short));
  if(S.correct)S.score++;render();
}
function checkWriteNL(){
  const ex=S.exercises[S.exIdx];
  const a=S.textAns.trim().toLowerCase();
  const full=ex.ans.toLowerCase();
  const short=full.replace(/^(de |het |een )/,'');
  S.checked=true;S.correct=(a===full||a===short);
  if(S.correct)S.score++;render();
}
function checkWriteFR(){
  const ex=S.exercises[S.exIdx];
  const a=S.textAns.trim().toLowerCase();
  const answers=ex.ans.toLowerCase().split('/').map(x=>x.trim());
  S.checked=true;S.correct=answers.some(ans=>a===ans||ans.includes(a)||a.includes(ans));
  if(S.correct)S.score++;render();
}

// ─── RESULT ──────────────────────────────────────────────────
function renderResult(){
  const C=LEVELS.find(l=>l.id===S.lesson.lvl)?.color||'#FF6B35';
  const lvlLessons=L.filter(l=>l.lvl===S.lesson.lvl);
  const curIdx=lvlLessons.findIndex(l=>l.id===S.lesson.id);
  const nextLesson=curIdx<lvlLessons.length-1?lvlLessons[curIdx+1]:null;
  let h=`<div style="padding:40px 20px 100px;text-align:center">
    <div style="font-size:60px;margin-bottom:16px">${S.score>=S.total*.7?'🎉':S.score>=S.total*.4?'💪':'📚'}</div>
    <h2 style="font-size:24px;font-weight:900;margin:0 0 8px">${S.score>=S.total*.7?'Uitstekend!':S.score>=S.total*.4?'Goed geprobeerd!':'Blijf oefenen!'}</h2>
    <p style="color:var(--dim);font-size:17px;margin:0 0 4px">${S.score} / ${S.total} correct</p>
    <p style="color:${C};font-size:14px;font-weight:700">+${S.score*10+20} XP</p>
    <div style="display:flex;flex-direction:column;gap:8px;margin-top:24px">
      <button class="btn" style="background:${C};color:#fff" onclick="S.screen='home';S.lesson=null;render()">🏠 Retour à l'accueil</button>`;
  if(nextLesson){
    h+=`<button class="btn" style="background:var(--card);color:${C};border:2px solid ${C}" onclick="startLesson(L[${L.indexOf(nextLesson)}])">▶ Leçon suivante : ${esc(nextLesson.t)}</button>`;
  }
  h+=`<button class="btn" style="background:var(--bg2);color:var(--dim)" onclick="startExercises()">🔄 Recommencer les exercices</button>
    </div></div>`;
  return h;
}

// ─── FLASHCARDS ──────────────────────────────────────────────
function renderFlash(){
  const cats=[{n:"Tout",f:null},{n:"A0",f:0},{n:"A1",f:1},{n:"A2",f:2},{n:"B1",f:3}];
  const pool=cats[S.fcCat].f!==null?VOCAB.filter(w=>w.lvl===cats[S.fcCat].f):VOCAB;
  const card=pool[S.fcIdx%pool.length];
  let h=`<div style="padding:0 20px 100px">
    <h2 style="font-size:22px;font-weight:900;padding-top:16px;margin:0 0 14px">⚡ Flashcards & Dico</h2>
    <div style="display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px">`;
  cats.forEach((c,i)=>{const p=c.f!==null?VOCAB.filter(w=>w.lvl===c.f):VOCAB;
    h+=`<button style="background:${S.fcCat===i?'var(--ac)':'var(--card)'};color:${S.fcCat===i?'#fff':'var(--dim)'};border:${S.fcCat===i?'none':'1px solid var(--brd)'};border-radius:10px;padding:7px 13px;font-size:12px;font-weight:700;white-space:nowrap;flex-shrink:0" onclick="S.fcCat=${i};S.fcIdx=0;S.fcFlip=false;render()">${c.n} (${p.length})</button>`;});
  h+=`</div>`;
  if(card){
    h+=`<div onclick="S.fcFlip=!S.fcFlip;render()" style="background:${S.fcFlip?'var(--ac)':'var(--card)'};border-radius:22px;padding:40px 24px;min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border:${S.fcFlip?'none':'1px solid var(--brd)'};box-shadow:0 6px 24px rgba(0,0,0,.12)">
      <div style="font-size:12px;font-weight:700;color:${S.fcFlip?'rgba(255,255,255,.7)':'var(--dim)'};text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">${S.fcFlip?'Français':'Nederlands'}</div>
      <div style="font-size:26px;font-weight:900;color:${S.fcFlip?'#fff':'var(--txt)'};text-align:center">${esc(S.fcFlip?card.fr:card.nl)}</div>
      ${!S.fcFlip?`<div style="margin-top:14px">${spBtn(card.nl)}</div>`:''}
      <div style="font-size:12px;color:${S.fcFlip?'rgba(255,255,255,.5)':'var(--dim)'};margin-top:14px">Tap pour retourner</div>
    </div>`;
    h+=`<div style="display:flex;gap:10px;margin-top:18px">
      <button style="flex:1;padding:12px;background:var(--card);border:1px solid var(--brd);border-radius:14px;font-size:20px;color:var(--txt)" onclick="S.fcIdx=(S.fcIdx-1+${pool.length})%${pool.length};S.fcFlip=false;render()">←</button>
      <div style="flex:2;display:flex;align-items:center;justify-content:center;color:var(--dim);font-weight:600;font-size:14px">${(S.fcIdx%pool.length)+1}/${pool.length}</div>
      <button style="flex:1;padding:12px;background:var(--ac);border-radius:14px;font-size:20px;color:#fff" onclick="S.fcIdx=(S.fcIdx+1)%${pool.length};S.fcFlip=false;render()">→</button>
    </div>`;
  }
  // Dict
  h+=`<div style="margin-top:24px"><h3 style="font-size:16px;font-weight:700;margin:0 0 10px">🔍 Dictionnaire</h3>
    <input id="dict-input" type="text" placeholder="Chercher NL ou FR..." oninput="S.search=this.value;render()"
    style="width:100%;padding:12px 16px;border-radius:14px;border:1px solid var(--brd);font-size:14px;background:var(--card);color:var(--txt);box-sizing:border-box">`;
  if(S.search){
    const s=S.search.toLowerCase();
    const res=VOCAB.filter(w=>w.nl.toLowerCase().includes(s)||w.fr.toLowerCase().includes(s)).slice(0,20);
    if(res.length){h+=`<div style="margin-top:8px;max-height:300px;overflow-y:auto;border-radius:14px;border:1px solid var(--brd)">`;
    res.forEach(w=>{h+=`<div style="padding:10px 14px;border-bottom:1px solid var(--brd);background:var(--card);display:flex;justify-content:space-between;align-items:center">
      <div style="display:flex;align-items:center;gap:8px">${spBtn(w.nl)}<div><span style="font-weight:700;font-size:14px">${esc(w.nl)}</span><span style="color:var(--dim);font-size:13px"> — ${esc(w.fr)}</span></div></div>
      <span style="font-size:10px;color:var(--dim);background:var(--bg2);padding:2px 7px;border-radius:6px">${['A0','A1','A2','B1'][w.lvl]}</span></div>`;});
    h+=`</div>`;}
  }
  h+=`</div></div>`;
  return h;
}

// ─── VERBS ───────────────────────────────────────────────────
function renderVerbs(){
  const AC='#4ECDC4';
  // Practice
  if(S.verbMode==='practice'){
    if(!S.verbQuiz){const v=VERBS[Math.floor(Math.random()*VERBS.length)];const t=['pr','pa','fu'][Math.floor(Math.random()*3)];S.verbQuiz=v;S.verbQT=t;S.verbPractice={};S.verbChecked=false;}
    const v=S.verbQuiz,t=S.verbQT;
    let forms;
    if(t==='fu')forms=Object.entries(ZULLEN).filter(([k])=>PRONOUNS.includes(k)).map(([k,z])=>[k,z+' '+v.inf]);
    else forms=Object.entries(v[t]||{}).filter(([k])=>PRONOUNS.includes(k));
    let h=`<div style="padding:0 20px 100px">
      <div style="padding-top:16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <button style="color:${AC};font-size:14px;font-weight:600" onclick="S.verbMode='browse';S.verbScore={t:0,c:0};render()">← Retour</button>
        <span style="color:${AC};font-weight:700;font-size:14px">✓ ${S.verbScore.c}/${S.verbScore.t}</span>
      </div>
      <div class="card" style="margin-bottom:16px"><p style="font-size:13px;color:var(--dim);margin:0 0 4px;font-weight:600">✏️ Conjugue au ${TNAMES[t]} :</p>
      <div style="display:flex;align-items:center;gap:8px"><p style="font-size:24px;font-weight:900;color:${AC};margin:0">${esc(v.inf)}</p><span style="color:var(--dim);font-size:14px">(${esc(v.fr)})</span>${spBtn(v.inf,AC)}</div></div>
      <div style="display:flex;flex-direction:column;gap:8px">`;
    forms.forEach(([p,f])=>{
      const a=S.verbPractice[p]?.trim().toLowerCase()||'';const c=f.toLowerCase();const ok=a===c||c.split('/').some(x=>a===x.trim());
      h+=`<div style="display:flex;align-items:center;gap:8px">
        <span style="width:56px;font-size:13px;font-weight:700;flex-shrink:0">${esc(p)}</span>
        <input class="conj-input${S.verbChecked?(ok?' ok':' nok'):''}" data-vprac="${esc(p)}" ${S.verbChecked?'disabled':''} placeholder="..." oninput="S.verbPractice['${esc(p)}']=this.value">
        ${S.verbChecked?`<span style="font-size:14px;flex-shrink:0">${ok?'✅':'❌'}</span>`:''}</div>`;});
    h+=`</div>`;
    if(S.verbChecked){h+=`<div class="card" style="margin-top:12px"><p style="font-size:13px;color:var(--dim);margin:0;line-height:1.7">${forms.map(([k,v])=>`<strong>${esc(k)}</strong> → ${esc(v)}`).join('<br>')}</p></div>`;
      h+=`<button class="btn" style="background:${AC};color:#fff;margin-top:12px" onclick="S.verbQuiz=null;S.verbPractice={};S.verbChecked=false;render()">Verbe suivant →</button>`;}
    else{const allF=forms.every(([k])=>S.verbPractice[k]?.trim());
      if(allF)h+=`<button class="btn" style="background:${AC};color:#fff;margin-top:14px" onclick="checkVerbPractice()">Vérifier</button>`;}
    return h+`</div>`;
  }
  // Verb selected
  if(S.verbSel){
    const v=S.verbSel;
    let h=`<div style="padding:0 20px 100px">
      <button style="color:${AC};font-size:14px;font-weight:600;padding:16px 0 8px" onclick="S.verbSel=null;render()">← Retour</button>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
        <div style="font-size:28px;font-weight:900;color:${AC}">${esc(v.inf)}</div><span style="color:var(--dim);font-size:15px">= ${esc(v.fr)}</span>${spBtn(v.inf,AC)}</div>
      <div style="display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap">`;
    ['pr','pa','fu','pf'].forEach(t=>{if(t==='pf'&&!v.pf)return;
      h+=`<button style="background:${S.verbTense===t?AC:'var(--card)'};color:${S.verbTense===t?'#fff':'var(--dim)'};border:${S.verbTense===t?'none':'1px solid var(--brd)'};border-radius:10px;padding:7px 13px;font-size:12px;font-weight:700" onclick="S.verbTense='${t}';render()">${TNAMES[t]}</button>`;});
    h+=`</div>`;
    // Table
    if(S.verbTense!=='pf'){
      let entries;
      if(S.verbTense==='fu')entries=Object.entries(ZULLEN).map(([k,z])=>[k,z+' '+v.inf]);
      else entries=Object.entries(v[S.verbTense]||{});
      h+=`<div class="card"><div style="display:flex;flex-direction:column;gap:1px">`;
      entries.forEach(([p,f],i)=>{h+=`<div style="display:flex;justify-content:space-between;padding:10px 0;${i<entries.length-1?'border-bottom:1px solid var(--brd)':''}">
        <span style="font-weight:700;color:var(--dim);font-size:14px">${esc(p)}</span>
        <div style="display:flex;align-items:center;gap:6px"><span style="font-weight:800;font-size:15px">${esc(f)}</span>${spBtn(p.replace('hij/zij','hij').replace('gij 🇧🇪','gij')+' '+f,AC)}</div></div>`;});
      h+=`</div>`;
      if(S.verbTense==='fu')h+=`<p style="font-size:12px;color:${AC};margin:12px 0 0;font-style:italic">💡 Futur = zullen + infinitif</p>`;
      h+=`</div>`;
    }else if(v.pf){
      const aux=v.pf[0]==='zijn'?{ik:'ben',jij:'bent','hij/zij':'is',wij:'zijn'}:{ik:'heb',jij:'hebt','hij/zij':'heeft',wij:'hebben'};
      h+=`<div class="card"><p style="font-size:13px;color:var(--dim);margin:0 0 10px">Auxiliaire + participe :</p><div style="display:flex;flex-direction:column;gap:1px">`;
      PRONOUNS.forEach((p,i)=>{h+=`<div style="display:flex;justify-content:space-between;padding:10px 0;${i<3?'border-bottom:1px solid var(--brd)':''}">
        <span style="font-weight:700;color:var(--dim);font-size:14px">${esc(p)}</span>
        <div style="display:flex;align-items:center;gap:6px"><span style="font-weight:800;font-size:15px">${esc(aux[p])} <span style="color:${AC}">${esc(v.pf[1])}</span></span>${spBtn(p.replace('hij/zij','hij')+' '+aux[p]+' '+v.pf[1],AC)}</div></div>`;});
      h+=`</div></div>`;}
    return h+`</div>`;
  }
  // Browse
  let h=`<div style="padding:0 20px 100px">
    <div style="padding-top:16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <h2 style="font-size:22px;font-weight:900;margin:0">📖 Verbes</h2>
      <button style="background:${AC};border-radius:12px;padding:8px 16px;color:#fff;font-weight:700;font-size:13px" onclick="S.verbMode='practice';S.verbQuiz=null;render()">🎯 S'entraîner</button>
    </div>
    <p style="color:var(--dim);font-size:12px;margin:0 0 14px">${VERBS.length} verbes · 4 temps · 🔊 audio</p>
    <div style="display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px">
    <button style="background:${!S.verbCat?AC:'var(--card)'};color:${!S.verbCat?'#fff':'var(--dim)'};border:${!S.verbCat?'none':'1px solid var(--brd)'};border-radius:10px;padding:7px 12px;font-size:12px;font-weight:700;white-space:nowrap;flex-shrink:0" onclick="S.verbCat=null;render()">Tous</button>`;
  VCATS.forEach(c=>{h+=`<button style="background:${S.verbCat===c?AC:'var(--card)'};color:${S.verbCat===c?'#fff':'var(--dim)'};border:${S.verbCat===c?'none':'1px solid var(--brd)'};border-radius:10px;padding:7px 12px;font-size:12px;font-weight:700;white-space:nowrap;flex-shrink:0" onclick="S.verbCat='${c}';render()">${c}</button>`;});
  h+=`</div><div style="display:flex;flex-direction:column;gap:6px">`;
  VERBS.filter(v=>!S.verbCat||v.cat===S.verbCat).forEach((v,i)=>{
    h+=`<button onclick="S.verbSel=VERBS[${VERBS.indexOf(v)}];S.verbTense='pr';render()" style="display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--brd);border-radius:14px;padding:12px 14px;text-align:left;width:100%">
      <div><span style="font-weight:800;font-size:15px">${esc(v.inf)}</span><span style="color:var(--dim);font-size:13px;margin-left:8px">= ${esc(v.fr)}</span></div>
      <div style="display:flex;align-items:center;gap:6px"><span style="font-size:10px;color:${AC};background:${AC}18;padding:2px 8px;border-radius:6px;font-weight:600">${v.cat}</span><span style="color:var(--dim);font-size:16px">›</span></div>
    </button>`;});
  return h+`</div></div>`;
}
function checkVerbPractice(){
  const v=S.verbQuiz,t=S.verbQT;
  let forms;
  if(t==='fu')forms=Object.entries(ZULLEN).filter(([k])=>PRONOUNS.includes(k)).map(([k,z])=>[k,z+' '+v.inf]);
  else forms=Object.entries(v[t]||{}).filter(([k])=>PRONOUNS.includes(k));
  const ok=forms.every(([k,f])=>{const a=S.verbPractice[k]?.trim().toLowerCase()||'';const c=f.toLowerCase();return a===c||c.split('/').some(x=>a===x.trim());});
  S.verbChecked=true;S.verbScore.t++;if(ok)S.verbScore.c++;render();
}

// ─── PROFILE ─────────────────────────────────────────────────
function renderProfile(){
  const tL=L.length,dL=S.progress.done.length,pct=Math.round(dL/tL*100);
  let h=`<div style="padding:0 20px 100px">
    <h2 style="font-size:22px;font-weight:900;padding-top:16px;margin:0 0 16px">👤 Profil</h2>
    <div style="background:linear-gradient(135deg,#FF6B35,#FF9F43);border-radius:20px;padding:20px;color:#fff">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        ${[{v:S.progress.xp||0,l:'XP',i:'⚡'},{v:dL+'/'+tL,l:'Leçons',i:'📘'},{v:pct+'%',l:'Progrès',i:'📈'},{v:VOCAB.length,l:'Mots',i:'💬'}].map(s=>`<div style="background:rgba(255,255,255,.15);border-radius:14px;padding:12px;text-align:center"><div style="font-size:18px">${s.i}</div><div style="font-weight:900;font-size:20px;margin-top:2px">${s.v}</div><div style="font-size:11px;opacity:.8">${s.l}</div></div>`).join('')}
      </div>
    </div>`;
  LEVELS.forEach(lv=>{const ls=L.filter(l=>l.lvl===lv.id);const dn=ls.filter(l=>S.progress.done.includes(l.id)).length;
    h+=`<div class="card" style="margin-top:8px;display:flex;align-items:center;gap:12px">
      <span style="font-size:22px">${lv.icon}</span>
      <div style="flex:1"><div style="font-weight:700;font-size:14px">${lv.id} — ${lv.name}</div>
      <div class="prog-bar" style="height:5px;margin-top:5px"><div class="prog-fill" style="width:${Math.round(dn/ls.length*100)}%;background:${lv.color}"></div></div></div>
      <span style="color:${lv.color};font-weight:700;font-size:13px">${dn}/${ls.length}</span></div>`;});
  h+=`<button class="btn" style="margin-top:20px;background:var(--card);color:#EF5350;border:1px solid #EF5350" onclick="if(confirm('Réinitialiser?')){S.progress={done:[],xp:0};saveProgress();render()}">Réinitialiser</button></div>`;
  return h;
}

// ─── INIT ────────────────────────────────────────────────────
speechSynthesis?.getVoices();
render();
